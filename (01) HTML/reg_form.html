<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Registration Form</title>
    </head>
    <body>
        <h2>Registration Form</h2>
        <form action="/action">
            <div>
                <input type="text" placeholder="First Name" name="fname">
                <input type="text" placeholder="Last Name" name="lname">
            </div>
            <div>
                <label for="gender">Please select gender </label>
                <select name="gender" id="gender">
                    <option value="M" selected>Male</option>
                    <option value="F">Female</option>
                    <option value="O">Others</option>
                </select>
            </div>
            <div>
                <label for="terms_of_service">Do you agree to all terms of service?</label>
                <input id="terms_of_service" type="checkbox" name="terms-of-srvc-agree" >
                <label for="terms_of_service">Yes, I agree</label>
            </div>
            <button>Register</button>
        </form>
        
    </body>
</html>
