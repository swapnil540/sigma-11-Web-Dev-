<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Feedback</title>
    </head>
    <body>
        <h2>Feedback Form</h2>
        <form action="/action">
            <div>
                <label for="fname">Name:</label>
                <input type="text" id="fname" name="fullName" placeholder="Write your name">
            </div>
            <br>
            <div>
                <label for="email">Email:</label>
                <input type="email" id="email" name="e-mail" placeholder="Write your email">
            </div>
            <br>
            <div>
                <label for="msg">Message:</label>
                <br>
                <textarea name="msg" id="msg" rows="4" cols="25"></textarea>
            </div>
            <br>
            <div>
                <div>Rate us  our 5:</div>
                <div>
                    <input type="radio" id="1" value="1" name="rating">
                    <label for="1">1</label>
                </div>
                <div>
                    <input type="radio" id="2" value="2" name="rating">
                    <label for="2">2</label> 
                </div>
                <div>
                    <input type="radio" id="3" value="3" name="rating">
                    <label for="3">3</label>
                </div>
                <div>
                    <input type="radio" id="4" value="4" name="rating">
                    <label for="4">4</label>
                </div>
                <div>
                    <input type="radio" id="5" value="5" name="rating">
                    <label for="5">5</label>
                </div>  
            </div>
            <br>
            <button>Send your message!</button>
        </form>
        
    </body>
</html>
