<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Tables</title>
    </head>
    <body>
        <table border="">
            <caption>Food Menu</caption>
            <!-- Table header -->
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Price</th>
                </tr>
            </thead>
            <!-- Table body  -->
            <tbody>
                <tr>
                    <td>Frooti</td>
                    <td>10.0000</td>
                </tr>
                <tr>
                    <td>Samosa</td>
                    <td>12</td>
                </tr>
                <tr>
                    <td>Chips</td>
                    <td>20</td>
                </tr>
            </tbody>
        </table>

        <!-- rowspan and colspan -->
         <table border="2">
            <caption>Food Menu 2</caption>
            <!-- Table header -->
             <thead>
                <tr>
                    <th rowspan="2">Item</th>
                    <th colspan="2">Price</th>
                </tr>
                <tr>
                    <th>INR</th>
                    <th>USD</th>
                </tr>
             </thead>
             <!-- Table Body -->
              <tbody>
                <tr>
                    <td>Frooti</td>
                    <td>10</td>
                    <td>0.14</td>
                </tr>
                <tr>
                    <td>Samosa</td>
                    <td>12</td>
                    <td>0.17</td>
                </tr>
                <tr>
                    <td>Chips</td>
                    <td>20</td>
                    <td>0.28</td>
                </tr>
              </tbody>
         </table>
        
    </body>
</html>
