<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forms in Bootstrap</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container">
      <h2>Form Demo</h2>
      <form>
        <!--mb-3 meaning margin bottom 3-->
        <div class="row">
          <div class="mb-3 col-md-6">
            <label class="form-label" for="email">Email</label>
            <input
              class="form-control"
              type="text"
              placeholder="Email"
              id="email"
            />
          </div>
          <div class="mb-3 col-md-6">
            <label class="form-label" for="password">Password</label>
            <input
              class="form-control"
              type="password"
              placeholder="Password"
              id="password"
            />
          </div>
        </div>

        <div class="mb-3">
          <select class="form-select" name="" id="">
            <option selected>Choose your city</option>
            <option value="mumbai">Mumbai</option>
            <option value="delhi">Delhi</option>
            <option value="pune">Pune</option>
          </select>
        </div>
        <div class="normal mb-3">
          <input type="checkbox" id="agr" />
          <label for="agr">Agree</label>
        </div>

        <div class="form-check mb-3">
          <label class="form-check-label" for="agr">Agree</label>
          <input class="form-check-input" type="checkbox" id="agr" />
        </div>
        <div class="normal mb-3">
          <input type="radio" id="radiobs" />
          <label for="radiobs">Yes/no</label>
        </div>

        <div class="form-check mb-3">
          <label class="form-check-label" for="radiobs">Yes/no</label>
          <input class="form-check-input" type="radio" id="radiobs" />
        </div>
        <div class="mb-3 form-switch form-check">
          <input
            type="checkbox"
            class="form-check-input"
            role="switch"
            id="switchCheck"
          />
          <label for="switchCheck" class="form-check-label"
            >Switch checkbox using bootstrap</label
          >
        </div>
      </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
