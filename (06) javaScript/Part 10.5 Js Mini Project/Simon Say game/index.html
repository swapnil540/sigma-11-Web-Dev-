<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="big-container">
        <h1>Simon Game</h1>
        <h4>HIGHSCORE : 0</h4>
        <h2>Press any key to start the game</h2>
        <div class="container">
            <div class="btn red" type="button" id="red"><b>RED</b></div>
            <div class="btn green" type="button" id="green"><b>GREEN</b></div>
            <div class="btn yellow" type="button" id="yellow"><b>YELLOW</b></div>
            <div class="btn purple" type="button" id="purple"><b>PURPLE</b></div>
        </div>
    </div>
    <div class="hint">HINT </div>
    <p>OPEN CONSOLE WINDOW TO SEE GAME SEQUENCE.</p>
    <script src="app.js"></script>
</body>
</html>
