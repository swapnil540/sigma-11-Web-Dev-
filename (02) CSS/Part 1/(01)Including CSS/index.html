<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning CSS</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Internal CSS */
        h1 {
            color: red;
            background-color: black;
        }
        
        p {
            color: orange;
        }

        button {
            color: rgba(228, 24, 79, 0.984);
            background-color: rgb(244, 198, 172);
        }
    </style>

</head>
<body>
    <!-- Inline CSS -->
    <h1 style="color:red">Apna college 1 -Inline CSS</h1>
    <p style="color:pink">This is a paragraph</p>
    <button style="color:blue; background-color:yellow;">Help</button>


    <!-- Style Tag -->
    <h1>Apna college 2 -Internal CSS</h1>
    <p>This is a paragraph</p>
    <button>Help</button>

    <h2>Apna college 3 -External CSS</h2>
   


    
</body>
</html>
